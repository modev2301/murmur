<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      margin: 0;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px 0;
      font-weight: 600;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #f5f5f5;
      border-radius: 6px;
      margin-bottom: 12px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #dc3545;
      flex-shrink: 0;
    }
    .status-dot.connected {
      background: #28a745;
    }
    .status-text {
      flex: 1;
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .stat {
      background: #f8f9fa;
      padding: 8px 10px;
      border-radius: 4px;
      text-align: center;
    }
    .stat-value {
      font-size: 18px;
      font-weight: 600;
      color: #007bff;
    }
    .stat-label {
      font-size: 11px;
      color: #666;
      margin-top: 2px;
    }
    .stat.warning .stat-value {
      color: #ffc107;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-top: 1px solid #e5e5e5;
    }
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .2s;
      border-radius: 22px;
    }
    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 2px;
      bottom: 2px;
      background-color: white;
      transition: .2s;
      border-radius: 50%;
    }
    input:checked + .toggle-slider {
      background-color: #007bff;
    }
    input:checked + .toggle-slider:before {
      transform: translateX(18px);
    }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #e5e5e5;
    }
    button {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #ddd;
      background: #fff;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    button:hover {
      background: #f5f5f5;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .info {
      font-size: 11px;
      color: #666;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #e5e5e5;
    }
    code {
      background: #f0f0f0;
      padding: 2px 4px;
      border-radius: 2px;
      font-size: 10px;
    }
  </style>
</head>
<body>
  <h1>Murmur</h1>
  
  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Checking...</span>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="sentCount">0</div>
      <div class="stat-label">Sent</div>
    </div>
    <div class="stat" id="queueStat">
      <div class="stat-value" id="queueCount">0</div>
      <div class="stat-label">Queued</div>
    </div>
  </div>

  <div class="toggle-row">
    <span>Capture timing data</span>
    <label class="toggle">
      <input type="checkbox" id="enableToggle">
      <span class="toggle-slider"></span>
    </label>
  </div>

  <div class="actions">
    <button id="flushBtn" disabled>Send Queue</button>
    <button id="clearBtn" disabled>Clear Queue</button>
  </div>

  <div class="info">
    Agent: <code>127.0.0.1:9876</code>
  </div>

  <script src="popup.js"></script>
</body>
</html>
