name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev
      - name: Run tests (Unix)
        if: matrix.os != 'windows-latest'
        run: cargo test --workspace
      - name: Run tests (Windows, skip dns-observer)
        if: matrix.os == 'windows-latest'
        run: cargo test --workspace --exclude murmur-dns-observer

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev
      - name: Build (Unix)
        if: matrix.os != 'windows-latest'
        run: cargo build --workspace --release --target ${{ matrix.target }}
      - name: Build (Windows, skip dns-observer)
        if: matrix.os == 'windows-latest'
        run: cargo build --workspace --exclude murmur-dns-observer --release --target ${{ matrix.target }}

  # Check binary size stays under 20MB (per onboarding guide)
  size-check:
    name: Binary Size Check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev
      - name: Build release
        run: cargo build --release
      - name: Check binary sizes
        run: |
          MAX_SIZE=$((20 * 1024 * 1024))  # 20MB in bytes
          for bin in target/release/murmur target/release/murmur-agent; do
            if [ -f "$bin" ]; then
              SIZE=$(stat -c%s "$bin")
              echo "$bin: $SIZE bytes"
              if [ "$SIZE" -gt "$MAX_SIZE" ]; then
                echo "ERROR: $bin exceeds 20MB limit"
                exit 1
              fi
            fi
          done
